spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/marketplace_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${HIBERNATE_DDL:update}
    properties:
      hibernate:
        format_sql: false
        jdbc.batch_size: 25
    open-in-view: false

server:
  port: ${PORT:8080}
  forward-headers-strategy: native

app:
  jwt:
    secret: ${JWT_SECRET:replace-this-with-a-very-long-secret-key-for-prod-1234567890}
    access-token-expiration-ms: 3600000
    refresh-token-expiration-ms: 604800000
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173}

springdoc:
  api-docs:
    enabled: ${ENABLE_SWAGGER:false}
  swagger-ui:
    enabled: ${ENABLE_SWAGGER:false}
    path: /swagger-ui.html
